<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Question Finder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple:    #7C3AED;
      --purple-dk: #5B21B6;
      --purple-lt: #EDE9FE;
      --orange:    #F97316;
      --orange-lt: #FFF7ED;
      --green:     #16A34A;
      --green-lt:  #F0FDF4;
      --gray-50:   #F9FAFB;
      --gray-100:  #F3F4F6;
      --gray-200:  #E5E7EB;
      --gray-400:  #9CA3AF;
      --gray-600:  #4B5563;
      --gray-900:  #111827;
      --text:      #1F2937;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: var(--gray-50);
      color: var(--text);
    }

    /* ── Top bar matching LMS ── */
    .topbar {
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      height: 56px;
    }
    .topbar-brand {
      font-size: 0.8rem;
      color: var(--gray-400);
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .topbar-title {
      font-size: 0.95rem;
      color: var(--purple);
      font-weight: 600;
    }
    .topbar-sep { color: var(--gray-400); }

    /* ── Hero / Search ── */
    .hero {
      background: linear-gradient(135deg, #fff 60%, var(--purple-lt) 100%);
      border-bottom: 3px solid var(--orange);
      padding: 2.5rem 2rem 2rem;
    }
    .hero-inner {
      max-width: 720px;
      margin: 0 auto;
    }
    .hero h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 0.3rem;
    }
    .hero p {
      color: var(--gray-600);
      font-size: 0.92rem;
      margin-bottom: 1.2rem;
    }

    .search-wrap {
      position: relative;
    }
    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-400);
      pointer-events: none;
      font-size: 1.1rem;
    }
    #searchInput {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.8rem;
      border: 2px solid var(--gray-200);
      border-radius: 10px;
      font-size: 1rem;
      color: var(--gray-900);
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
      resize: none;
      line-height: 1.5;
      min-height: 54px;
      font-family: inherit;
    }
    #searchInput:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
    }
    #searchInput::placeholder { color: var(--gray-400); }

    /* ── Results area ── */
    .results-wrap {
      max-width: 720px;
      margin: 1.5rem auto 3rem;
      padding: 0 2rem;
    }

    .results-meta {
      font-size: 0.8rem;
      color: var(--gray-400);
      margin-bottom: 0.8rem;
      min-height: 1.2em;
    }
    .results-meta strong { color: var(--purple); }

    /* Card — mirrors the quiz card style from LMS */
    .card {
      background: #fff;
      border-radius: 10px;
      border-left: 4px solid var(--orange);
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      margin-bottom: 1rem;
      overflow: hidden;
      animation: fadeUp 0.18s ease both;
    }
    .card:nth-child(2) { animation-delay: 0.04s; }
    .card:nth-child(3) { animation-delay: 0.08s; }
    .card:nth-child(4) { animation-delay: 0.12s; }
    .card:nth-child(5) { animation-delay: 0.16s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      padding: 1rem 1.2rem 0.6rem;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }
    .card-icon {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      background: var(--orange-lt);
      border: 2px solid var(--orange);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--orange);
      margin-top: 1px;
    }
    .card-q {
      font-size: 0.97rem;
      font-weight: 600;
      color: var(--gray-900);
      line-height: 1.45;
    }
    .card-q mark {
      background: rgba(124,58,237,0.12);
      color: var(--purple-dk);
      border-radius: 3px;
      padding: 0 2px;
    }
    .card-answer {
      background: var(--green-lt);
      border-top: 1px solid #BBFBD0;
      padding: 0.65rem 1.2rem 0.65rem 3.15rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .answer-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--green);
    }
    .answer-text {
      font-size: 0.92rem;
      color: #166534;
      font-weight: 500;
    }
    .card-footer {
      padding: 0.4rem 1.2rem 0.4rem 3.15rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .unit-badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--purple);
      background: var(--purple-lt);
      border-radius: 4px;
      padding: 2px 7px;
    }
    .score-bar-wrap {
      flex: 1;
      height: 3px;
      background: var(--gray-100);
      border-radius: 99px;
      overflow: hidden;
    }
    .score-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--orange), var(--purple));
      border-radius: 99px;
      transition: width 0.3s;
    }

    /* Empty / idle states */
    .state-idle, .state-empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--gray-400);
    }
    .state-idle p, .state-empty p {
      font-size: 0.9rem;
      max-width: 320px;
      margin: 0 auto;
    }


    @media (max-width: 600px) {
      .hero { padding: 1.5rem 1rem 1.2rem; }
      .results-wrap { padding: 0 1rem; }
      .topbar { padding: 0 1rem; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <span class="topbar-brand">Course Activities</span>
  <span class="topbar-sep">/</span>
  <span class="topbar-title">Communicative English · Question Finder</span>
</div>

<div class="hero">
  <div class="hero-inner">
    <h1>Find a Question</h1>
    <p>Paste or type any part of a question — see the closest matches and their answers instantly.</p>
    <div class="search-wrap">
      <span class="search-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></span>
      <textarea id="searchInput" placeholder="e.g. Which article guarantees equality before the law…" rows="1"></textarea>
    </div>
  </div>
</div>

<div class="results-wrap">
  <div class="results-meta" id="resultsMeta"></div>
  <div id="results">
    <div class="state-idle">
      <p>Start typing or paste a question above.</p>
    </div>
  </div>
</div>

"Unit 1","q":"The Preamble of the Indian Constitution is not enforceable in courts of law. (True/False)","a":"True"},{"unit":"Unit 1","q":"The Preamble declares India to be a democratic country to ensure:","a":"Political and social justice"},{"unit":"Unit 1","q":"The idea of 'Unity of the Nation' in the Preamble signifies:","a":"The unity of the people of India"},{"unit":"Unit 1","q":"The Preamble serves as the guiding spirit and philosophy of the Indian Constitution. (True/False)","a":"True"},{"unit":"Unit 1","q":"The Preamble declares India to be a secular country to ensure:","a":"Freedom of religion and conscience"},{"unit":"Unit 1","q":"The Preamble emphasizes the importance of 'Justice' in three aspects. Which of the following is NOT one of them?","a":"Gender justice"},{"unit":"Unit 1","q":"The Preamble was incorporated into the Indian Constitution on the recommendation of the:","a":"Constituent Assembly's drafting committee"},{"unit":"Unit 1","q":"The Preamble of the Indian Constitution can be amended by:","a":"A special majority in the Parliament and ratification by half of the state legislatures"},{"unit":"Unit 1","q":"The Preamble of the Indian Constitution was inspired by the Preamble of the Constitution of which country?","a":"United States of America"},{"unit":"Unit 1","q":"The term 'Secular' in the Preamble of the Indian Constitution means:","a":"Separation of religion and state"},{"unit":"Unit 1","q":"The Preamble of the Indian Constitution was enacted as a part of the Constitution on:","a":"26th November 1949"},{"unit":"Unit 1","q":"The Preamble declares India to be a sovereign country to ensure:","a":"Political independence"},{"unit":"Unit 1","q":"The Preamble of the Indian Constitution declares that the source of authority and power is derived from:","a":"The people of India"},{"unit":"Unit 1","q":"The objectives of the Preamble are:","a":"Non-justiciable and unenforceable"},{"unit":"Unit 1","q":"The Preamble declares India to be a socialist country to ensure:","a":"Equitable distribution of resources"},{"unit":"Unit 1","q":"The Preamble of the Indian Constitution does not mention:","a":"Fraternity"},{"unit":"Unit 1","q":"The Preamble of the Indian Constitution represents the aspirations and objectives of the people of India. (True/False)","a":"True"},{"unit":"Unit 1","q":"The Preamble of the Indian Constitution was influenced by the philosophy of which prominent Indian leader?","a":"Mahatma Gandhi"},{"unit":"Unit 1","q":"The Preamble of the Indian Constitution was adopted without any amendment. (True/False)","a":"True"},{"unit":"Unit 1","q":"The term 'Justice' in the Preamble signifies the need for:","a":"Equality before the law"},{"unit":"Unit 1","q":"The Preamble of the Indian Constitution is the introductory statement that explains the aims and objectives of the Constitution. (True/False)","a":"True"},{"unit":"Unit 1","q":"The Preamble declares India to be a federal country to ensure:","a":"Division of powers between the center and the states"},{"unit":"Unit 1","q":"The Indian Constitution was adopted on:","a":"26th November 1949"},{"unit":"Unit 1","q":"The Indian Constitution is classified as:","a":"Quasi-federal"},{"unit":"Unit 1","q":"The preamble of the Indian Constitution declares India to be a:","a":"Sovereign Socialist Secular Democratic Republic"},{"unit":"Unit 1","q":"The Indian Constitution borrowed the idea of the Directive Principles of State Policy from which country?","a":"Ireland"},{"unit":"Unit 1","q":"The Indian Constitution is the longest written constitution in the world, consisting of how many articles?","a":"366"},{"unit":"Unit 1","q":"The Constitution of India provides for a ________ form of government.","a":"Parliamentary"},{"unit":"Unit 1","q":"The Indian Constitution has how many Schedules that contain lists and other important information?","a":"12"},{"unit":"Unit 1","q":"The concept of 'Basic Structure' of the Constitution was established by the Supreme Court in which landmark case?","a":"Keshavananda Bharati vs. State of Kerala"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of a ______ system at the state level.","a":"Bicameral"},{"unit":"Unit 1","q":"The Constitution of India grants special autonomous status to which state?","a":"Jammu and Kashmir"},{"unit":"Unit 1","q":"The Indian Constitution guarantees Fundamental Rights under Part:","a":"III"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of Panchayats and Municipalities under:","a":"Directive Principles of State Policy"},{"unit":"Unit 1","q":"The President of India is the head of the state, while the Prime Minister is the head of the government. (True/False)","a":"True"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of an independent judiciary, headed by the:","a":"Chief Justice of India"},{"unit":"Unit 1","q":"The Indian Constitution was drafted and adopted by the:","a":"Constituent Assembly of India"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of which type of government at the center?","a":"Parliamentary"},{"unit":"Unit 1","q":"The Indian Constitution follows which system of law?","a":"Common Law System"},{"unit":"Unit 1","q":"The Constitution of India divides the powers between the central government and state governments under which scheme?","a":"Three Lists Scheme"},{"unit":"Unit 1","q":"The concept of 'Judicial Review' allows the judiciary to review the constitutionality of laws and executive actions. (True/False)","a":"True"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of the Supreme Court of India as the highest court of the country. How many judges are there in the Supreme Court?","a":"It varies as per the requirement"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of which body to safeguard the rights of citizens and act as the custodian of the Constitution?","a":"Supreme Court of India"},{"unit":"Unit 1","q":"The Constitution of India originally had how many Fundamental Duties that citizens are expected to follow?","a":"10"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of a single citizenship for the entire country. (True/False)","a":"True"},{"unit":"Unit 1","q":"The President of India is elected by an electoral college consisting of:","a":"Members of Parliament (Lok Sabha and Rajya Sabha) and State Legislative Assemblies"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of a Planning Commission to formulate and assess economic plans. (True/False)","a":"False"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of an Election Commission to conduct and supervise elections. (True/False)","a":"True"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of a Comptroller and Auditor General (CAG) to audit and report on government finances. (True/False)","a":"True"},{"unit":"Unit 1","q":"The Indian Constitution prohibits the practice of untouchability. (True/False)","a":"True"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of an All India Services system to ensure administrative efficiency. (True/False)","a":"True"},{"unit":"Unit 1","q":"The Indian Constitution recognizes which language as the official language of the Union?","a":"English"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of which institution to safeguard and promote the rights of minorities in India?","a":"National Commission for Minorities"},{"unit":"Unit 1","q":"The Indian Constitution guarantees the right to education as a:","a":"Fundamental Right"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of which institution to investigate and examine complaints of corruption against public servants?","a":"Central Vigilance Commission (CVC)"},{"unit":"Unit 1","q":"The Indian Constitution provides for the appointment of which authority to inquire into the conduct of the President and other Union government officials?","a":"Lokpal"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of a Finance Commission to determine the distribution of financial resources between the Union and the States. (True/False)","a":"True"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of a National Human Rights Commission (NHRC) to protect and promote human rights in the country. (True/False)","a":"True"},{"unit":"Unit 1","q":"The Indian Constitution guarantees the right to freedom of speech and expression under Article:","a":"19"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of a Public Service Commission in each state to conduct examinations for appointments to civil services. (True/False)","a":"True"},{"unit":"Unit 1","q":"The Indian Constitution guarantees the right to life and personal liberty under Article:","a":"21"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of a National Commission for Women (NCW) to safeguard the rights and interests of women in India. (True/False)","a":"True"},{"unit":"Unit 1","q":"The Indian Constitution guarantees the right to freedom of religion under Article:","a":"25"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of a National Green Tribunal (NGT) to handle cases related to environmental protection and conservation. (True/False)","a":"True"},{"unit":"Unit 1","q":"The Indian Constitution guarantees the right to constitutional remedies under Article:","a":"32"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of a Central Information Commission (CIC) to promote transparency and accountability in the working of government offices. (True/False)","a":"True"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of which authority to protect the interests of Scheduled Castes and Scheduled Tribes and promote their social, educational, and economic development?","a":"National Commission for Scheduled Castes"},{"unit":"Unit 1","q":"The Indian Constitution guarantees the right to protection against discrimination on the grounds of religion, race, caste, sex, or place of birth under Article:","a":"15"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of which institution to protect the linguistic minorities and their rights in India?","a":"National Commission for Linguistic Minorities"},{"unit":"Unit 1","q":"The Indian Constitution guarantees the right to protection against exploitation, including the prohibition of forced labor, under Article:","a":"23"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of which institution to protect and promote the rights of children and ensure their well-being?","a":"National Commission for Protection of Child Rights (NCPCR)"},{"unit":"Unit 1","q":"The Indian Constitution guarantees the right to protection against untouchability and the prohibition of its practice under Article:","a":"17"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of which institution to investigate and inquire into complaints of corruption against public functionaries?","a":"Lokpal"},{"unit":"Unit 1","q":"The Indian Constitution guarantees the right to protection of cultural and educational rights for minorities under Article:","a":"30"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of which institution to safeguard and promote the rights of tribal communities in India?","a":"National Commission for Scheduled Tribes"},{"unit":"Unit 1","q":"The Indian Constitution guarantees the right to protection of life and personal liberty against arbitrary arrest and detention under Article:","a":"21"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of which authority to inquire into grievances and complaints against administrative actions and decisions?","a":"Central Administrative Tribunal (CAT)"},{"unit":"Unit 1","q":"The Indian Constitution guarantees the right to protection of the interests of minorities to establish and administer educational institutions of their choice under Article:","a":"30"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of which institution to investigate and inquire into complaints of corruption in the armed forces?","a":"Chief of Defense Staff"},{"unit":"Unit 1","q":"The Indian Constitution guarantees the right to protection of personal liberty and habeas corpus under Article:","a":"21"},{"unit":"Unit 1","q":"The Indian Constitution provides for the establishment of which institution to promote and protect the rights of consumers in India?","a":"National Consumer Disputes Redressal Commission (NCDRC)"},{"unit":"Unit 2","q":"What are DPSPs in the Indian Constitution?","a":"Guidelines for the governance of the country"},{"unit":"Unit 2","q":"Which part of the Indian Constitution contains DPSPs?","a":"Part IV"},{"unit":"Unit 2","q":"DPSPs are inspired by which country's constitution?","a":"Ireland"},{"unit":"Unit 2","q":"DPSPs are enforceable in a court of law.","a":"False"},{"unit":"Unit 2","q":"Which article of the Indian Constitution deals with the implementation of DPSPs?","a":"Article 36"},{"unit":"Unit 2","q":"DPSPs primarily aim to promote the welfare of which group?","a":"All"},{"unit":"Unit 2","q":"Which amendment to the Constitution added the 42nd Amendment, significantly altering DPSPs?","a":"42nd Amendment"},{"unit":"Unit 2","q":"Which of the following is NOT one of the main principles outlined in DPSPs?","a":"None"},{"unit":"Unit 2","q":"DPSPs are primarily the responsibility of which level of government in India?","a":"All"},{"unit":"Unit 2","q":"DPSPs can be enforced by the courts in certain circumstances.","a":"False"},{"unit":"Unit 2","q":"The DPSPs are primarily drawn from which section of the Indian Constitution?","a":"Part IV - Directive Principles of State Policy"},{"unit":"Unit 2","q":"According to DPSPs, what should be the duty of the State towards raising the level of nutrition and the standard of living of its people?","a":"To secure a social order for the promotion of welfare of the people"},{"unit":"Unit 2","q":"Which Directive Principle promotes the separation of the judiciary from the executive in the public services of the State?","a":"Article 50"},{"unit":"Unit 2","q":"DPSPs are legally enforceable and can be used to challenge unconstitutional laws.","a":"False"},{"unit":"Unit 2","q":"The Directive Principles of State Policy in the Indian Constitution are based on the philosophy of which Indian leader?","a":"Mahatma Gandhi"},{"unit":"Unit 2","q":"Which of the following is NOT a category of Directive Principles of State Policy in the Indian Constitution?","a":"Foreign Policy Directives"},{"unit":"Unit 2","q":"DPSPs are applicable only to the Indian government and do not influence the functioning of private individuals or organizations.","a":"True"},{"unit":"Unit 2","q":"Which Directive Principle emphasizes securing opportunities for healthy development and a just childhood for children?","a":"Article 45"},{"unit":"Unit 2","q":"DPSPs aim to promote the educational and economic interests of which of the following groups?","a":"Scheduled Castes and Scheduled Tribes"},{"unit":"Unit 2","q":"According to DPSPs, what should the State endeavour to do in relation to agriculture and animal husbandry?","a":"Encourage large-scale commercial farming"},{"unit":"Unit 2","q":"Which Directive Principle aims to protect and improve the environment and safeguard forests and wildlife?","a":"Article 48A"},{"unit":"Unit 2","q":"DPSPs are considered less important than Fundamental Rights in the Indian Constitution.","a":"True"},{"unit":"Unit 2","q":"Which amendment to the Indian Constitution added a new Directive Principle related to the promotion of international peace and security?","a":"42nd Amendment"},{"unit":"Unit 2","q":"According to DPSPs, what should the State do to promote the educational and economic interests of weaker sections of society, especially Scheduled Castes and Scheduled Tribes?","a":"Provide reservation in public employment and education"},{"unit":"Unit 2","q":"Which Directive Principle emphasizes the separation of the judiciary from the executive for the proper functioning of the justice system?","a":"Article 50"},{"unit":"Unit 2","q":"DPSPs are applicable only to the central government and do not extend to state governments.","a":"False"},{"unit":"Unit 2","q":"The DPSPs are directly justiciable, and citizens can approach the courts if they are not implemented by the government.","a":"False"},{"unit":"Unit 2","q":"Which Directive Principle aims to protect and improve public health and prohibit the consumption of intoxicating drinks and drugs that are injurious to health?","a":"Article 47"},{"unit":"Unit 2","q":"The idea of a welfare state in DPSPs was added during which amendment to the Indian Constitution?","a":"42nd Amendment"},{"unit":"Unit 2","q":"According to DPSPs, what should the State do to promote cottage industries on an individual or cooperative basis in rural areas?","a":"Secure that the operation of the economic system does not result in the concentration of wealth and means of production to the common detriment"},{"unit":"Unit 2","q":"According to DPSPs, what should the State do to promote equal justice and free legal aid for economically weaker sections of society?","a":"Establish an independent judiciary"},{"unit":"Unit 2","q":"DPSPs are only applicable to citizens of India and do not extend to non-citizens.","a":"True"},{"unit":"Unit 2","q":"DPSPs aim to establish an egalitarian society in India by promoting economic and social democracy.","a":"True"},{"unit":"Unit 2","q":"Which Article of the Indian Constitution says that there shall be a President of India?","a":"52"},{"unit":"Unit 2","q":"Who among the following holds office during the pleasure of the President?","a":"Governor"},{"unit":"Unit 2","q":"Which of the following is not true regarding the payment of the emoluments of the President?","a":"They are charged on the Contingency Fund of India."},{"unit":"Unit 2","q":"What qualifications should be to become a President?","a":"Only i and iii"},{"unit":"Unit 2","q":"How can the post of President be vacant?","a":"Only i and ii"},{"unit":"Unit 2","q":"Which of the following statements is not correct?","a":"President of India the chairman of the Finance Commission"},{"unit":"Unit 2","q":"The executive actions of the government are carried out under whose name?","a":"President"},{"unit":"Unit 2","q":"What are the maximum number of terms that a person can hold for the office of President?","a":"No limit"},{"unit":"Unit 2","q":"Who appoints the chief of Army, Navy, and Air Force?","a":"President"},{"unit":"Unit 2","q":"What does \u201crespite\u201d mean in terms of the powers granted to the President?","a":"in presence of a special circumstance, like physical disability, the President can award a lesser sentence than the one that was originally granted"},{"unit":"Unit 2","q":"Which among the following Veto powers is NOT granted to the President?","a":"Qualified Veto"},{"unit":"Unit 2","q":"The President gives his resignation to the","a":"Vice President"},{"unit":"Unit 2","q":"In case a President dies while in office, the vice President can act as President for a maximum period of","a":"6 months"},{"unit":"Unit 2","q":"Who administers the oath of office to the President of India ?","a":"Chief Justice of India"},{"unit":"Unit 2","q":"The five year term of the President is calculated from the","a":"Day he assumes charge"},{"unit":"Unit 2","q":"Who acts as the President of India when neither the President nor the Vice President is available?","a":"Chief Justice of India"},{"unit":"Unit 2","q":"The Constitution of India adopted Fundamental Duties from the Constitution of ___","a":"Russia"},{"unit":"Unit 2","q":"When Fundamental Duties were added in the Constitution of India?","a":"1976"},{"unit":"Unit 2","q":"At present how many Fundamental Duties are in the Constitution of India?","a":"11"},{"unit":"Unit 2","q":"In the Indian Constitution, Fundamental Duties are given in which article?","a":"Article 51A"},{"unit":"Unit 2","q":"Which of the following statements is false?","a":"In 2002, after the 82nd Constitution Amendment Act, another Fundamental Duty was added."},{"unit":"Unit 2","q":"Which of the following committee advocated the Fundamental Duties in the Indian constitution?","a":"Swaran Singh Committee"},{"unit":"Unit 2","q":"Which of the following is not the Fundamental Duty?","a":"To obey the parents"},{"unit":"Unit 2","q":"Which Constitutional Amendment Act was passed to provide compulsory education to children between 6 and 14 years?","a":"86th"},{"unit":"Unit 2","q":"When was the 'Prevention of Insults to National Honour Act' passed?","a":"1971"},{"unit":"Unit 2","q":"What is the minimum age for holding office in the Lok Sabha?","a":"25 Years"},{"unit":"Unit 2","q":"A motion of no confidence against the Government can be introduced in:","a":"Lok Sabha"},{"unit":"Unit 2","q":"How many sessions of the Lok Sabha take place in a year?","a":"3"},{"unit":"Unit 2","q":"Which of the following are not sessions of the Lok Sabha?","a":"Summer Session"},{"unit":"Unit 2","q":"The budget is also known as:","a":"Annual Financial Statement"},{"unit":"Unit 2","q":"The Parliament of India consists of the following:","a":"Both A and B"},{"unit":"Unit 2","q":"Who decides whether a bill is a Money Bill or not?","a":"Speaker of the Lok Sabha"},{"unit":"Unit 2","q":"The Federal structure of the Government of India provides:","a":"Three-tier system"},{"unit":"Unit 2","q":"Indian Parliamentary System is based on which model?","a":"Westminster model"},{"unit":"Unit 2","q":"How many members are there in the Lok Sabha, the lower house of the Indian Parliament?","a":"545"},{"unit":"Unit 2","q":"What is the name of the upper house of the Indian Parliament?","a":"Rajya Sabha"},{"unit":"Unit 2","q":"Which among the following can be said to be a part of the Parliament of India?","a":"All"},{"unit":"Unit 2","q":"Which among the following statements is/are true? 1. The maximum strength of Rajya Sabha is fixed at 278 2. In USA, the states are given proportional representation in the Senate according to their population 3. The American Senate has a fixed quota of 12 nominated senate members, just like India 4. Both Lok Sabha and Rajya Sabha can pass a motion of no-confidence against the government","a":"None"},{"unit":"Unit 2","q":"Which among the following statements is/are true? 1. Lok Sabha and Rajya Sabha both follow the method of Proportional Representation for electing members 2. Rajya Sabha members are elected by the elected members of the state legislative assemblies 3. Maximum strength of Lok Sabha is fixed at 552 4. The voting age was reduced from 21 to 18 by the 61st Constitutional Amendment Act, 1988.","a":"Only 2,3, and 4"},{"unit":"Unit 2","q":"Which among the following statements is/are false? 1. For qualifying to the Lok Sabha, a person must be at least 25 years of age 2. A person can be a member of both Lok Sabha and Rajya Sabha at the same time 3. A person belonging to Scheduled Caste or Scheduled Tribe can contest elections from a general seat also, and not just the reserved seat 4. If a member of either of the Houses votes against the directions given by his party, he can be deemed to be disqualified","a":"Only 2"},{"unit":"Unit 2","q":"What is NOT true about the tenure of the Speaker of the Lok Sabha?","a":"When the Lok Sabha dissolves, the Speaker vacates his position simultaneously"},{"unit":"Unit 2","q":"Which among the following statements is/are NOT true? 1. The Chairman of the Rajya Sabha is the one who presides over a joint sitting of both Lok Sabha and Rajya Sabha 2. The Chairman of Rajya Sabha and the Speaker of Lok Sabha both have the authority to decide whether a bill is a money bill or not 3. The President of India is the ex-officio chairman of Rajya Sabha 4. The Chairman of Rajya Sabha is also considered to be a member of Rajya Sabha, in the same way that the Speaker of Lok Sabha is a member of Lok Sabha too","a":"All of the above"},{"unit":"Unit 2","q":"Which among the following statements is/are NOT true about the 'Leader of the House'?","a":"The President nominates the 'Leader of the House' for the Rajya Sabha"},{"unit":"Unit 2","q":"What is the meaning of the word Quorum?","a":"Minimum number of members required to be present in the House before it can transact any type of business"},{"unit":"Unit 2","q":"Which among the following statements is/are true? 1. A minister belonging to Lok Sabha can take part in proceedings in Rajya Sabha 2. A minister belonging to Rajya Sabha can take part in proceedings in Lok Sabha 3. A minister belonging to Lok Sabha can take part in voting process in Rajya Sabha 4. A minister belonging to Rajya Sabha can take part in voting process in Lok Sabha","a":"Only 1 and 2"},{"unit":"Unit 2","q":"What are the three types of questions asked in the Question Hour?","a":"Starred, Unstarred, Short notice"},{"unit":"Unit 2","q":"Which among the following statements is/are NOT true about the No-Confidence motion?","a":"It can also be moved against an individual minister"},{"unit":"Unit 2","q":"Which among the following statements is/are NOT true about the Public Bill?","a":"Notice period for introduction of Bill is one month"},{"unit":"Unit 2","q":"Which among the following statements is/are true about the Money Bill? 1. Money Bill can be introduced only in the Lok Sabha 2. The Speaker of the Lok Sabha carries the final decision-making authority on whether a Bill is a Money Bill or not 3. Rajya Sabha can only make recommendations to the Money Bill, it cannot change it or reject it 4. Money Bill can be introduced only after the recommendation of the President","a":"All are true"},{"unit":"Unit 2","q":"Which among the following statements is/are true about Financial Bills? 1. All Money Bills are Financial Bills but not all Financial Bills are Money Bills 2. Some types of Financial Bills can be changed or rejected by the Rajya Sabha 3. Some types of Financial Bills can be introduced in either of the Houses- Lok Sabha or Rajya Sabha 4. All types of Financial Bills can only be introduced in the Lok Sabha","a":"Only 1, 2 and 3"},{"unit":"Unit 2","q":"Which among the following statements is/are true about Joint Sitting of Two Houses (Lok Sabha and Rajya Sabha) ? 1. The joint sitting takes place according to the rules of Lok Sabha and not Rajya Sabha 2. The quorum of a joint sitting is one-tenth of the total members of both Lok Sabha and Rajya Sabha 3. So far there have only been three joint sittings of both Lok Sabha and Rajya Sabha 4. The Speaker of the Lok Sabha presides over the joint sitting of Lok Sabha and Rajya Sabha","a":"All are true"},{"unit":"Unit 2","q":"Which of the following is/are true regarding the appointment of the Prime Minister (PM)? 1) Article 75 provides procedure for selection and appointment of the PM. 2) A person not belonging to any house of the Parliament can become the PM.","a":"Neither 1 nor 2"},{"unit":"Unit 2","q":"Which articles deal with the relationship between the President and the PM?","a":"All"},{"unit":"Unit 2","q":"Which of the following is/are true? 1) PM is the chairman of the Planning Commission. 2) PM is the principal channel of communication between the President and the council of Ministers. 3) He advises the president with regard to the appointment of chairman of UPSC.","a":"All of the above"},{"unit":"Unit 2","q":"The total number of members nominated by the President to the Lok Sabha and the Rajya Sabha is","a":"14"},{"unit":"Unit 2","q":"Which one of the following does not constitute the electoral college for electing the President of India ?","a":"Elected members of the Legislative Council"},{"unit":"Unit 2","q":"Council of Ministers in a Parliamentary type of Government can remain in \u2018office till it enjoys the support of the-","a":"Majority of the members of the Lower House of Parliament"},{"unit":"Unit 2","q":"Which of the following appointments is not made by the President of India?","a":"Speaker of the Lok Sabha"},{"unit":"Unit 2","q":"Who appoints the Prime Minister of India ?","a":"President"},{"unit":"Unit 2","q":"The charge of impeachment against the President of India for his removal can be preferred by","a":"Both Houses of Parliament"},{"unit":"Unit 2","q":"Who was the first Prime Minister of India ?","a":"Jawaharlal Nehru"},{"unit":"Unit 2","q":"The Union Council of Ministers consists of","a":"Cabinet Ministers, Minister of State and Deputy Ministers"},{"unit":"Unit 2","q":"Who administers the oath of office to the President of India before he enters upon the office ?","a":"Chief Justice I"},{"unit":"Unit 2","q":"A person who is not a member of Parliament can be appointed as a Minister by the President for a maximum period of","a":"6 months"},{"unit":"Unit 2","q":"When can a President use his discretion in appointing the Prime Minister?","a":"When no political party enjoys a clear majority in the Lok Sabha."},{"unit":"Unit 2","q":"If in a country, there happens to be the office of monarchy as well as a Parliamentary form of government this monarch will be called?","a":"Head of the State"},{"unit":"Unit 2","q":"The President nominates 12 members of the Rajya Sabha according to?","a":"Their distinction in the field of science, art, literature and social service."},{"unit":"Unit 2","q":"Who can initiate impeachment proceedings against the President of India?","a":"Either House of Parliament"},{"unit":"Unit 2","q":"Who among the following is directly responsible to Parliament for all matters concerning the Defence Services of India?","a":"Defence Minister"},{"unit":"Unit 2","q":"Is the Prime Minister bound to advise the President on matters on which his advice is sought?","a":"Yes"},{"unit":"Unit 2","q":"Who among the following can attend meetings of the Union Cabinet?","a":"Cabinet Ministers"},{"unit":"Unit 2","q":"Who acts as the President of India when neither the President nor the Vice President is available?","a":"Chief Justice of India"},{"unit":"Unit 2","q":"The Union Council of Ministers is appointed by the?","a":"President of India on the advice of the Prime Minister"},{"unit":"Unit 2","q":"The President can proclaim emergency on the written advice of the?","a":"Prime Minister"},{"unit":"Unit 2","q":"The Union Council of Ministers is collectively responsible to?","a":"House of the People"},{"unit":"Unit 2","q":"Who is the ex-officio Chairman of the Council of States?","a":"Vice-President"},{"unit":"Unit 2","q":"When Parliament is not in session, the President can promulgate an ordinance which is to be ratified by the Parliament within?","a":"6 weeks from the reassembly of Parliament"},{"unit":"Unit 2","q":"The President may for violation of the Constitution be removed from the office by?","a":"Impeachment"},{"unit":"Unit 2","q":"In which of the following situations does the President act in his own discretion?","a":"In returning a proposal to the Council of Ministers for reconsideration"},{"unit":"Unit 2","q":"The Prime Minister, Union Cabinet Minister, Chief Minister, and Council of Ministers are all members of?","a":"National Development Council"},{"unit":"Unit 2","q":"The President can make laws through ordinances?","a":"During the recess of the Parliament"},{"unit":"Unit 2","q":"If the President returns a Bill sent to him for his assent and the Parliament once again passes the Bill in its original form, then the President?","a":"Gives assent to the bill"},{"unit":"Unit 2","q":"If a Minister loses a no-confidence motion, then?","a":"The whole Council of Ministers resigns"},{"unit":"Unit 2","q":"The control of the preparation of electoral rolls for Parliament and legislature vests with the?","a":"Election Commission"},{"unit":"Unit 2","q":"The Vice President is elected by an Electoral College consisting of members of?","a":"Both Houses of Parliament"},{"unit":"Unit 2","q":"The maximum age prescribed for election as President is?","a":"No such limit"},{"unit":"Unit 2","q":"The power to decide an election petition is vested in the?","a":"Election Commission"},{"unit":"Unit 2","q":"To elect the President of India, which one of the following election procedures is used?","a":"System of proportional representation by means of the single transferable vote"},{"unit":"Unit 2","q":"In which year were the first general elections held in India?","a":"1950-51"},{"unit":"Unit 2","q":"Election to the House of the People and the Legislative Assemblies of States in India are conducted on the basis of?","a":"Adult franchise"},{"unit":"Unit 2","q":"Who appoints the Chief Election Commissioner of India?","a":"President"},{"unit":"Unit 2","q":"Which is the highest judicial authority in India whose decisions are binding on all courts?","a":"Supreme Court"},{"unit":"Unit 2","q":"How many judges are there in the Supreme Court?","a":"31 judges including the Chief Justice of India"},{"unit":"Unit 2","q":"Who appoints the judges of the Supreme Court?","a":"President"},{"unit":"Unit 2","q":"Which among the following is NOT a criteria for being eligible to be a judge of the Supreme Court?","a":"Above 40 years of age"},{"unit":"Unit 2","q":"Who is appointed as the Chief Justice of India?","a":"The senior-most judge of the Supreme Court is appointed as the Chief Justice of India"},{"unit":"Unit 2","q":"What among the following statements is NOT true about the procedure to remove the judge of a Supreme Court of India? \n1. The judge of the Supreme Court may be removed from his current office by an order of the President \n2. There are only two grounds of removal: incapacity or proved misbehavior \n3. So far, no judge of the Supreme Court has been removed by impeachment \n4. The procedure for the removal of the judges is regulated by the Judges Enquiry Act (1968)","a":"All are true"},{"unit":"Unit 2","q":"Where is the declared seat of the Supreme Court situated?","a":"Delhi"},{"unit":"Unit 2","q":"Which among the following statements is/are NOT true? \n1. Supreme Courts can issue writs that relate with only the Fundamental Rights of citizens \n2. High Courts can issue writs on issues that relate with the Fundamental Rights of citizens as well as for other reasons \n3. The jurisdiction with regards to writs is wider for the High Courts as compared to Supreme Court of India \n4. The writ jurisdiction of the Supreme Court can be extended by the Parliament, but never decreased","a":"All are true"},{"unit":"Unit 2","q":"Supreme Court of India was inaugurated in the year?","a":"1950"},{"unit":"Unit 2","q":"Which of the following is not the requisite qualification of Supreme Court judges?","a":"He should be a minimum of 35 years old."},{"unit":"Unit 2","q":"In the removal of judges process, the speaker or chairman of Lok Sabha/Rajya Sabha constitutes a three-member committee to investigate the charges of misbehavior or incapacity of judges. Which of the following is NOT a member of the committee?","a":"Leader of the opposition of the Lok Sabha"},{"unit":"Unit 2","q":"Which of the following disputes do not come under the Original Jurisdiction of the Supreme Court?","a":"Inter-State Water dispute"},{"unit":"Unit 2","q":"Doctrine of Judicial Review originated from which country?","a":"The USA"},{"unit":"Unit 2","q":"Concept of Judicial Activism originated from which country?","a":"The USA"},{"unit":"Unit 2","q":"The Concept of Public Interest Litigation (PIL) originated from which country?","a":"The USA"},{"unit":"Unit 2","q":"Which of the following are included in the original jurisdiction of the Supreme Court? \n1. A dispute between the Government of India and one or more States. \n2. A dispute regarding elections to either the House of the Parliament or that of the Legislature of a State. \n3. A dispute between the Government of India and a Union Territory. \n4. A dispute between two or more States.","a":"1 and 4"},{"unit":"Unit 2","q":"What is the provision to safeguard the autonomy of the Supreme Court of India? \n1. While appointing the Supreme Court Judges, the President of India has to consult the Chief Justice of India. \n2. The Supreme Court Judges can be removed by the Chief Justice of India only. \n3. The salaries of the Judges are charged to the Consolidated Fund of India to which the legislature does not have to vote. \n4. All appointments of officers and staff of the Supreme Court of India are made by the Government only after consulting the Chief Justice of India.","a":"1 and 3 only"},{"unit":"Unit 2","q":"The power of the Supreme Court of India to decide disputes between the Centre and the States falls under its?","a":"Original jurisdiction"},{"unit":"Unit 2","q":"The power to increase the number of judges in the Supreme Court of India is vested in?","a":"The Parliament"},{"unit":"Unit 2","q":"Who/Which of the following is the custodian of the Constitution of India?","a":"The Supreme Court of India"},{"unit":"Unit 2","q":"In India, Judicial Review implies?","a":"The power of the Judiciary to pronounce upon the constitutionality of laws and executive orders."},{"unit":"Unit 2","q":"Consider the following statements \n1. The 44th Amendment to the Constitution of India introduced an Article placing the election of the Prime Minister beyond judicial review. \n2. The Supreme Court of India struck down the 99th Amendment to the Constitution of India as being violative of the independence of the judiciary. \nWhich of the statements given above is/are correct?","a":"2 only"},{"unit":"Unit 2","q":"Given below are two statements \nAssertion [A]: The scope of judicial review is limited in India. \nReason [R]: The Indian constitution has some borrowed items. \nSelect the right answer from the code given below:","a":"Both [A] and [R] are correct but [R] is not the correct explanation of [A]"},{"unit":"Unit 2","q":"A judge of the Supreme Court may resign his office by writing a letter to (UPPSC 2014):","a":"The President"},{"unit":"Unit 2","q":"Given below are two statements, one is labelled as Assertion (A) and the other as Reason (R): \nAssertion (A): The Supreme Court of India has exclusive jurisdiction regarding the constitutional validity of central laws. \nReason (R): The Supreme Court is the Guardian of the Indian Constitution. \nSelect the correct answer from the codes given below:","a":"A is false but R is true."},{"unit":"Unit 2","q":"Which one of the following is directly related to the Appellate jurisdiction of the Supreme Court of India?","a":"Appeals made in civil, criminal and constitutional cases"},{"unit":"Unit 2","q":"How can the number of judges in the Supreme Court of India be increased?","a":"By a Parliamentary Act"},{"unit":"Unit 2","q":"Which of the following categories of disputes is excluded from the original jurisdiction of the Supreme Court?","a":"Between residents of two or more states"},{"unit":"Unit 2","q":"Which one of the following statements is NOT correct?","a":"Supreme Court may issue writs for the enforcement of any legal right within the territory of India"},{"unit":"Unit 2","q":"The Supreme Court of India is different from its counterpart in the U.S.A.:","a":"In its advisory role"},{"unit":"Unit 2","q":"Which one of the following statements is correct?","a":"A dispute between one State and another can only be dealt with by the Supreme Court"},{"unit":"Unit 2","q":"Judicial Review in the Indian Constitution is based on:","a":"Procedure established by law"},{"unit":"Unit 3","q":"Which of the following article empower for \u201cNational Emergency\u201d?","a":"Article 352"},{"unit":"Unit 3","q":"Which of the following is not the basis for the proclamation of \u201cNational Emergency\u201d?","a":"Internal disturbance"},{"unit":"Unit 3","q":"Which of the following constitutional amendment act made the declaration of National Emergency immune from Judicial review?","a":"38th Amendment Act (1975)"},{"unit":"Unit 3","q":"Proclamation of emergency must be approved by both the houses of parliament within?","a":"1 month"},{"unit":"Unit 3","q":"Which type of Majority is needed to pass the emergency resolution in Parliament?","a":"Special Majority [ majority of total membership and 2/3rd of the members of the present and voting;"},{"unit":"Unit 3","q":"National emergency was not declared in which of the following year?","a":"1999"},{"unit":"Unit 3","q":"Which of the following is/are true? 1) Part 20 deals with emergency provisions. 2) An Emergency, converts the federal structure into a unitary one without a formal amendment of the Constitution.","a":"Only 2"},{"unit":"Unit 3","q":"Which of the following was proposed by the Supreme Court in the Bommai Case (1994)? 1) The burden lies on the Centre to prove that relevant reasons exist to justify the imposition of the President\u2019s Rule. 2) The state legislative assembly should be dissolved only after the Parliament has approved the presidential proclamation. 3) A state government pursuing anti-secular politics is liable to action under Article 356.","a":"All of the above"},{"unit":"Unit 3","q":"Which of the following is/are true? 1) Critics claim that emergency provisions undermine the Fundamental Rights. 2) President becomes dictator by emergency provisions as per the critics.","a":"Only 2"},{"unit":"Unit 3","q":"National emergency remains in operation with approval of the Parliament for -","a":"Maximum period of six months"},{"unit":"Unit 3","q":"In case of declaration of financial emergency -","a":"It can be passed by a simple majority"},{"unit":"Unit 3","q":"Which of the following is/are true? 1) Maximum period for President\u2019s Rule is 3 years. 2) President\u2019s Rule doesn\u2019t affect Fundamental Rights of citizens as opposed to National Emergency.","a":"Both 1 and 2"},{"unit":"Unit 3","q":"Which of the following state has had the President\u2019 Rule imposed for a maximum number of times?","a":"Kerala"},{"unit":"Unit 3","q":"Which of the following is/are true? 1) President can declare internal emergency on grounds of internal disturbance. 2) The President can proclaim a national emergency only after receiving a written recommendation from the cabinet.  3) The 42nd Amendment Act of 1976 enabled the president to limit the operation of a National Emergency to a specified part of IndiA) 4) President can declare a national emergency even before the actual occurrence of war or external aggression.","a":"2, 3, 4"},{"unit":"Unit 3","q":"Which of the following sentence/sentences is/are correct? 1) Article 359 does not actually suspend the Fundamental Rights. 2) Article 20 and Article 21 can be restricted only during National Emergency on grounds of war or external aggression.","a":"Only 1"},{"unit":"Unit 3","q":"Which of the following sentence/sentences is/are correct? 1) During National Emergency, life of the Lok Sabha may be extended for one year at a time. 2) Fundamental Rights under Article 19 can be suspended only when the National Emergency is declared on the ground of war.","a":"Both 1 and 2"},{"unit":"Unit 3","q":"Which of the following is/are true regarding effects of National Emergency on Centre-State relations? 1) During normal times the President has power to give directions to the states on all the matters. 2) During emergency, legislative power of state legislature is suspendeD) 3) During emergency, the President can issue ordinances on the state subjects. 4) During emergency, President may modify distribution of financial resources between the center and the state.","a":"1, 3, 4"},{"unit":"Unit 3","q":"If president of India exercises his power under article 356 of the constitution in the respect of a particular state, then -","a":"Parliament assumes the power to legislate on subject in the state list."},{"unit":"Unit 3","q":"Which of the following constitutional amendments equipped President to impose National Emergency on any particular part of India?","a":"42nd"},{"unit":"Unit 3","q":"When was the word \"armed rebellion\" added to the Constitution to declare a National Emergency?","a":"After 44th Constitution Amendment Act"},{"unit":"Unit 3","q":"How soon imposition of National Emergency should be approved by the Parliament?","a":"1 month"},{"unit":"Unit 3","q":"If the announcement of the National Emergency has been approved by both Houses of Parliament, how long will it be effective?","a":"6 months"},{"unit":"Unit 3","q":"Which kind of emergency will be imposed in the case of war, external aggression and armed rebellion?","a":"352"},{"unit":"Unit 3","q":"How many times have the financial emergency imposed in India?","a":"Never"},{"unit":"Unit 3","q":"Which of the following Fundamental Rights do not get abolished automatically during National Emergency?","a":"Both b and c"},{"unit":"Unit 3","q":"Which of the following statements is not true?","a":"When a National Emergency is enforced, the Fundamental Rights of Article 19 are repealed after the President's order."},{"unit":"Unit 3","q":"How many times have the National Emergency been implemented in India?","a":"3"},{"unit":"Unit 3","q":"Which of the following is a synonym of emergency?","a":"All"},{"unit":"Unit 3","q":"Consider the following statement in context Emergency provisions. (1) Emergency due to war, external aggression or armed rebellion that popularly known as National Emergency comes under Art. 356.  (2) An Emergency due to the failure of the constitutional Machinery in the states comes under Article 360. (3) Financial Emergency due to a threat to the financial stability or credit of India that popularly known as President Rule in the country comes under Article 352. \nWhich of the statement given above is / are correct.","a":"None of the above"},{"unit":"Unit 3","q":"Consider the following statement. (1) The 42nd Amendment Act of 1976 enabled the President of limit the operation of a National Emergency to a specified part of IndiA) (2) 44th Amendment Act of 1978 substituted the word \u2018armed Rebellion\u2019 for internal disturbance. (3) When a National emergency is declared on the ground of war or external aggression it is known as \u2018External Emergency\u2019. (4) When National emergency declared on the ground of \u2018armed rebellion\u2019 it is known as \u2018Internal Emergency\u2019. Which of the statement given above is / are correct.","a":"All of the above"},{"unit":"Unit 3","q":"Consider the following statement on context of Emergency provisions. 1) The proclamation of Emergency must be approved by both the house of parliament within 15 days from the date of its issue. 2) The period allowed for approval by the Parliament was two months before the 44th Amendment Act of 1978. 3) If approved by both the house of Parliament the emergency continues for six months and can be extended to an indefinite period with an approval of the parliament for every six months. 4) its continuance must be passed by both house of parliament by a special majority. Which of the statement given above is / are correct.","a":"2, 3 & 4 only"},{"unit":"Unit 3","q":"Consider the following statements: 1) The Rajya Sabha alone has the power to declare that it would be in national interest for the parliament to legislate with respect to a matter in the state list. 2) Resolution approving the proclamation of Emergency are passed only by the Lok Sabha. Which of the statements given above is / are correct.","a":"1 only"},{"unit":"Unit 3","q":"Emergency power are influenced from constitution of which country","a":"Germany"},{"unit":"Unit 3","q":"Constitution handles emergencies related to","a":"All"},{"unit":"Unit 3","q":"National emergency can be declared due to?","a":"All"},{"unit":"Unit 3","q":"Which is true regarding proclamation declaring emergency?","a":"all"},{"unit":"Unit 3","q":"Which is true regarding President's proclamation declaring National emergency?","a":"A proclamation must be approved by both houses within one month by a special majority."},{"unit":"Unit 3","q":"Which is true regarding revocation of President's proclamation?","a":"all"},{"unit":"Unit 3","q":"Effects of national emergency","a":"both a and b"},{"unit":"Unit 3","q":"Which is true regarding the effect of national emergency on Fundamental rights","a":"both"},{"unit":"Unit 3","q":"Which is true regarding Constitutional emergencies","a":"both"},{"unit":"Unit 3","q":"What is true regarding declaration of constitutional emergency?","a":"both"},{"unit":"Unit 3","q":"Beyond the first year, president\u2019s rule can be extended 6 months at a time only if","a":"both"},{"unit":"Unit 3","q":"Which is true with regards to the revocation of president's rule?","a":"Presidents proclamation can be revoked by president anytime"},{"unit":"Unit 3","q":"Which is applicable to financial emergency","a":"all"},{"unit":"Unit 3","q":"Effect of the Financial Emergency","a":"both"},{"unit":"Unit 3","q":"Which is true regarding financial emergency","a":"both"},{"unit":"Unit 3","q":"Which of the following is/are true regarding constitutional position of Governor of the state? 1) Reservation of a bill for the consideration of the President is by discretion of the Governor. 2) Recommendation of the imposition of the President\u2019s Rule in the state is not as per the discretion of the Governor. 3) Ministerial advice is not binding on the Governor.","a":"1, 3"},{"unit":"Unit 3","q":"Which of the following is/are true regarding special responsibilities of the Governor? 1) Regarding Assam it is with respect to the administration of tribal areas. 2) Regarding Arunachal Pradesh it is with respect to law and order in the state. 3) Regarding Nagaland it is with respect to development of tribal areas. 4) Regarding Karnataka it is with respect to law and order related to formation of Telangana.","a":"1, 2"},{"unit":"Unit 3","q":"What is/are true regarding term of Governor\u2019s office? 1) Governor has no security of tenure. 2) Governor holds office for a term of five years.","a":"Both 1 and 2"},{"unit":"Unit 3","q":"Which of the following is/are true regarding conditions of office of the Governor? 1) For Governor of two states the emoluments are divided amongst the states as decided by the President. 2) Governor, during his term, cannot be arrested or imprisonment for criminal proceedings. 3) The oath of office to the Governor is administered by the Chief Justice of the concerned State High Court.","a":"All"},{"unit":"Unit 3","q":"Which statements are true regarding legislative powers of the Governor? 1) Governor can reserve bill for Presidents consideration when it opposes a Directive Principle of State Policy. 2) Governor calls for joint sitting of both the houses of state legislature (in case of bi-cameral legislature). 3) He nominates 1 Anglo-Indian to the state legislative assembly.","a":"1, 3"},{"unit":"Unit 3","q":"What are executive, financial and judicial powers of the Governor? 1) Governor cannot remove members of State Public Service Commission. 2) President consults him while appointing the judges of the concerned State High Court. 3) Governor appoints people to the judicial service of the state.","a":"All"},{"unit":"Unit 3","q":"Which of the following is/are true regarding the appointment of the Governor? 1) Feature of appointing the Governor has been taken from the Irish Constitution. 2) Constitution provides only 2 qualifications for a person who can be appointed as a Governor.","a":"Only 2"},{"unit":"Unit 3","q":"Which of the following is/are true regarding the President and the Governor? 1) President and Governor can pardon a death sentence. 2) Governor always needs instructions from the President for issuing ordinances.","a":"Neither 1 nor 2"},{"uni slature"},{"unit":"Unit 3","q":"Consider the following statements in relation to the Governor of a State in IndiA) (1) He must be a citizen of India by birth. (2) Must have completed the age of 35 years. (3) He must be eligible to be a member of the Lok SabhA) (4) He may be appointed as Governor for two or more states. Which of these is/are correct?","a":"2 and 4 are correct"},{"unit":"Unit 3","q":"State Governor is appointed by ________.","a":"President of India"},{"unit":"Unit 3","q":"Consider the following and select the correct answer by using the code given below. (1) The Governor shall take oath or affirmation before entering upon his office. (2) The format of oath or affirmation is given in the Third Schedule of the Indian Constitution. (3) The Governor shall make and subscribe the oath or affirmation in the presence of the Chief Justice of the High Court or in his absence senior-most Judge of that Court. (4) The process of oath and affirmation is given in Article 159 of Indian Constitution.","a":"1, 3 and 4"},{"unit":"Unit 3","q":"Consider the following statements and select your answer from the codes given below. (1) The Governor does not have the power to appoint the judge of a state High Court.  (2) He is not a part of the Legislature. (3) He has the power to nominate some members in the Legislative Council. (4) He has no judicial powers.","a":"1 and 3 are correct"},{"unit":"Unit 3","q":"Which one of the following Statements about the State Governors is not true?","a":"He can pardon a sentence of death"},{"unit":"Unit 3","q":"Which of the following are the discretionary powers given to the Governor of a State? (1) Sending a report to the President of India for imposing the President\u2019s Rule.(2)  Appointing the Ministers. (3) Reserving certain bills passed by the State Legislature for consideration of the President of IndiA) (4) Making rules to conduct the business of the State Government. Select the correct answer using the codes given below.","a":"On // ── Stopwords ──
const STOP = new Set("a an the is are was were be been being have has had do does did will would could should may might shall can of in on at to for with by from up about into through during before after above below between among and or but not that this these those it its we our us you your they their them he she him his her i me my also both each few more most other some such than then there when where which while who whom why how".split(" "));

function tokenize(str) {
  return str.toLowerCase().replace(/[^a-z0-9 ]/g, " ").split(/\s+/).filter(w => w.length > 1 && !STOP.has(w));
}

function score(qTokens, queryTokens) {
  if (queryTokens.length === 0) return 0;
  const qSet = new Set(qTokens);
  let hits = 0;
  for (const t of queryTokens) {
    if (qSet.has(t)) hits++;
    else {
      // partial: check if any qToken contains the query token as substring
      for (const qt of qSet) {
        if (qt.includes(t) || t.includes(qt)) { hits += 0.5; break; }
      }
    }
  }
  // Jaccard-ish: hits / union
  const union = new Set([...qTokens, ...queryTokens]).size;
  return hits / union + (hits / queryTokens.length) * 0.5;
}

function highlight(text, queryTokens) {
  if (!queryTokens.length) return escHtml(text);
  // Sort longest first to avoid nested replacements
  const sorted = [...queryTokens].sort((a,b) => b.length - a.length);
  const re = new RegExp("(" + sorted.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|") + ")", "gi");
  return escHtml(text).replace(re, "<mark>$1</mark>");
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Pre-tokenize all questions
const indexed = QUESTIONS.map(q => ({ ...q, tokens: tokenize(q.q) }));

let debounceTimer;
const input = document.getElementById("searchInput");
const resultsEl = document.getElementById("results");
const metaEl = document.getElementById("resultsMeta");

// Auto-grow textarea
input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 160) + "px";
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(doSearch, 120);
});

function doSearch() {
  const raw = input.value.trim();
  if (!raw) {
    metaEl.innerHTML = "";
    resultsEl.innerHTML = `<div class="state-idle"><p>Start typing or paste a question above.</p></div>`;
    return;
  }
  const qTokens = tokenize(raw);
  if (!qTokens.length) {
    metaEl.innerHTML = "";
    resultsEl.innerHTML = `<div class="state-empty"><p>Try a few more words.</p></div>`;
    return;
  }

  const scored = indexed
    .map(item => ({ ...item, _score: score(item.tokens, qTokens) }))
    .filter(item => item._score > 0)
    .sort((a, b) => b._score - a._score)
    .slice(0, 6);

  const maxScore = scored[0]?._score ?? 1;

  if (!scored.length) {
    metaEl.innerHTML = "";
    resultsEl.innerHTML = `<div class="state-empty"><p>No matches found. Try different keywords.</p></div>`;
    return;
  }

  metaEl.innerHTML = `Showing <strong>${scored.length}</strong> closest match${scored.length !== 1 ? "es" : ""}`;

  resultsEl.innerHTML = scored.map((item, i) => {
    const pct = Math.round((item._score / maxScore) * 100);
    return `
      <div class="card">
        <div class="card-header">
          <div class="card-icon">${i + 1}</div>
          <div class="card-q">${highlight(item.q, qTokens)}</div>
        </div>
        <div class="card-answer">
          <span class="answer-label">Answer</span>
          <span class="answer-text">${escHtml(item.a)}</span>
        </div>
        <div class="card-footer">
          <span class="unit-badge">${escHtml(item.unit)}</span>
          <div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%"></div></div>
        </div>
      </div>`;
  }).join("");
}
